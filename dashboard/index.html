<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maya 2.0 — Order Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f0f1a;
      --surface:  #1a1a2e;
      --surface2: #16213e;
      --accent:   #e94560;
      --green:    #00d084;
      --yellow:   #f0a500;
      --blue:     #4facfe;
      --red:      #e94560;
      --text:     #e8e8f0;
      --muted:    #888aa0;
      --border:   #2a2a45;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.3rem; font-weight: 700; letter-spacing: -.5px; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .status-badge { font-size:.75rem; padding:4px 10px; border-radius:20px; font-weight:600; letter-spacing:.5px; }
    .status-badge.connected    { background:rgba(0,208,132,.15); color:var(--green); border:1px solid rgba(0,208,132,.3); }
    .status-badge.disconnected { background:rgba(233,69,96,.15);  color:var(--red);   border:1px solid rgba(233,69,96,.3); }
    .stats { display:flex; gap:20px; font-size:.85rem; color:var(--muted); }
    .stat strong { color:var(--text); font-weight:700; }

    /* ── Toolbar ── */
    .toolbar { max-width:1200px; margin:0 auto; padding:20px 24px 0; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .filter-btn { padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; font-size:.82rem; font-weight:600; transition:all .15s; }
    .filter-btn:hover,.filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(233,69,96,.08); }
    .toolbar-spacer { flex:1; }
    .sound-btn { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; font-size:.8rem; transition:all .15s; }
    .sound-btn.on { border-color:var(--green); color:var(--green); background:rgba(0,208,132,.08); }

    /* ── Grid ── */
    main { max-width:1200px; margin:0 auto; padding:16px 24px 40px; }
    #orders-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; margin-top:16px; }

    /* ── Cards ── */
    .order-card {
      background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden;
      transition:transform .15s,box-shadow .15s; animation:slideIn .3s ease;
    }
    .order-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.4); }
    @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .card-header { padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
    .card-customer { font-weight:700; font-size:1rem; }
    .card-time { font-size:.8rem; color:var(--muted); margin-top:2px; }

    .badge { font-size:.7rem; font-weight:700; letter-spacing:.8px; padding:3px 10px; border-radius:20px; text-transform:uppercase; }
    .badge-confirmed  { background:rgba(0,208,132,.12);  color:var(--green);  border:1px solid rgba(0,208,132,.25); }
    .badge-in_prep    { background:rgba(79,172,254,.12);  color:var(--blue);   border:1px solid rgba(79,172,254,.25); }
    .badge-ready      { background:rgba(0,208,132,.2);    color:var(--green);  border:1px solid rgba(0,208,132,.4); }
    .badge-picked_up  { background:rgba(136,138,160,.12); color:var(--muted);  border:1px solid rgba(136,138,160,.25); }
    .badge-catering   { background:rgba(240,165,0,.12);   color:var(--yellow); border:1px solid rgba(240,165,0,.25); }
    .badge-escalated  { background:rgba(233,69,96,.12);   color:var(--red);    border:1px solid rgba(233,69,96,.25); }
    .badge-pending_callback { background:rgba(240,165,0,.12); color:var(--yellow); border:1px solid rgba(240,165,0,.25); }
    .badge-cancelled  { background:rgba(136,138,160,.1);  color:var(--muted);  border:1px solid rgba(136,138,160,.2); }

    .source-tag { font-size:.68rem; font-weight:700; letter-spacing:.5px; padding:2px 7px; border-radius:10px; text-transform:uppercase; }
    .source-chatbot { background:rgba(79,172,254,.12); color:var(--blue);   border:1px solid rgba(79,172,254,.25); }
    .source-voice   { background:rgba(233,69,96,.1);  color:var(--accent); border:1px solid rgba(233,69,96,.2); }

    .card-body { padding:12px 16px; }
    .card-meta { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; font-size:.82rem; }
    .meta-label { color:var(--muted); }
    .meta-value { color:var(--text); font-weight:600; }

    .items-list { margin-top:8px; }
    .item-row { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; border-bottom:1px solid var(--border); font-size:.85rem; }
    .item-row:last-child { border-bottom:none; }
    .item-name  { color:var(--text); }
    .item-mods  { color:var(--muted); font-size:.78rem; margin-left:6px; }
    .item-price { color:var(--muted); font-size:.82rem; flex-shrink:0; }

    .card-footer { padding:10px 16px 14px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); gap:8px; }
    .subtotal { font-size:1.1rem; font-weight:700; color:var(--green); }
    .prep-time { font-size:.78rem; color:var(--muted); }

    /* ── Status Action Buttons ── */
    .status-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .status-btn {
      padding:4px 12px; border-radius:16px; border:1px solid var(--border); background:var(--surface2);
      color:var(--muted); cursor:pointer; font-size:.75rem; font-weight:600; transition:all .15s;
    }
    .status-btn:hover { opacity:.8; }
    .status-btn.in_prep   { border-color:var(--blue);   color:var(--blue);   background:rgba(79,172,254,.08); }
    .status-btn.ready     { border-color:var(--green);  color:var(--green);  background:rgba(0,208,132,.08); }
    .status-btn.picked_up { border-color:var(--muted);  color:var(--muted);  background:rgba(136,138,160,.08); }
    .status-btn.print-btn { border-color:var(--border); color:var(--muted); }
    .status-btn.print-btn:hover { border-color:var(--text); color:var(--text); }

    /* ── Empty State ── */
    .empty-state { text-align:center; padding:80px 20px; color:var(--muted); grid-column:1/-1; }
    .empty-state .icon { font-size:3rem; margin-bottom:16px; }
    .empty-state h3 { font-size:1.2rem; color:var(--text); margin-bottom:8px; }

    /* ── Toast ── */
    #toast-container { position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:999; }
    .toast { background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--green); padding:12px 16px; border-radius:8px; font-size:.85rem; max-width:300px; animation:toastIn .3s ease; box-shadow:0 4px 20px rgba(0,0,0,.4); }
    .toast.catering { border-left-color:var(--yellow); }
    .toast.status-change { border-left-color:var(--blue); }
    @keyframes toastIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

    @media(max-width:600px) { .stats{display:none} main{padding:12px} #orders-grid{grid-template-columns:1fr} }

    /* ── Payment Section ── */
    .payment-section {
      padding:10px 16px 0;
      border-top:1px solid var(--border);
    }
    .payment-btns { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
    .pay-btn {
      flex:1; padding:7px 10px; border-radius:8px; border:none; cursor:pointer;
      font-size:.78rem; font-weight:700; letter-spacing:.3px; transition:all .15s;
      display:flex; align-items:center; justify-content:center; gap:4px; min-width:80px;
    }
    .pay-btn:active { transform:scale(.97); }
    .pay-btn.terminal { background:rgba(79,172,254,.15); color:var(--blue);   border:1px solid rgba(79,172,254,.35); }
    .pay-btn.link     { background:rgba(240,165,0,.15);  color:var(--yellow); border:1px solid rgba(240,165,0,.35); }
    .pay-btn.cash     { background:rgba(0,208,132,.15);  color:var(--green);  border:1px solid rgba(0,208,132,.35); }
    .pay-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

    .payment-badge {
      display:inline-flex; align-items:center; gap:5px; font-size:.78rem; font-weight:700;
      padding:5px 12px; border-radius:8px; letter-spacing:.3px;
    }
    .payment-badge.paid-card  { background:rgba(79,172,254,.15);  color:var(--blue);   border:1px solid rgba(79,172,254,.3); }
    .payment-badge.paid-cash  { background:rgba(0,208,132,.15);   color:var(--green);  border:1px solid rgba(0,208,132,.3); }
    .payment-badge.paid-link  { background:rgba(0,208,132,.15);   color:var(--green);  border:1px solid rgba(0,208,132,.3); }
    .payment-badge.processing { background:rgba(240,165,0,.1);    color:var(--yellow); border:1px solid rgba(240,165,0,.25); }
    .payment-badge.link-sent  { background:rgba(240,165,0,.1);    color:var(--yellow); border:1px solid rgba(240,165,0,.25); }

    /* ── Print ── */
    @media print {
      body { background:white; color:black; }
      header, .toolbar, #toast-container { display:none; }
      .order-card { border:1px solid #ccc; break-inside:avoid; margin-bottom:12px; }
      .status-actions { display:none; }
      .payment-section { display:none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Maya 2.0 — Live Orders
  </div>
  <div class="header-right">
    <a href="/onboard" style="font-size:.82rem;color:var(--muted);text-decoration:none;padding:6px 14px;border:1px solid var(--border);border-radius:20px;transition:all .15s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">+ Add Restaurant</a>
    <div class="stats">
      <span>Today: <strong id="stat-today">0</strong></span>
      <span>Revenue: <strong id="stat-revenue">$0</strong></span>
      <span>Catering: <strong id="stat-catering">0</strong></span>
    </div>
    <span class="status-badge disconnected" id="conn-badge">● Connecting...</span>
  </div>
</header>

<div class="toolbar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="confirmed">Confirmed</button>
  <button class="filter-btn" data-filter="in_prep">In Prep</button>
  <button class="filter-btn" data-filter="ready">Ready</button>
  <button class="filter-btn" data-filter="picked_up">Picked Up</button>
  <button class="filter-btn" data-filter="pending_callback">Catering</button>
  <button class="filter-btn" data-filter="escalated">Escalated</button>
  <div class="toolbar-spacer"></div>
  <button class="sound-btn on" id="sound-toggle" onclick="toggleSound()">🔔 Sound On</button>
</div>

<main>
  <div id="orders-grid">
    <div class="empty-state">
      <div class="icon">📞</div>
      <h3>Waiting for orders...</h3>
      <p>Orders appear here in real time as Maya takes them.</p>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script>
  let allOrders = [];
  let currentFilter = 'all';
  let ws = null;
  let soundEnabled = true;
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const dashKey = new URLSearchParams(window.location.search).get('key') || '';
    ws = new WebSocket(`${proto}://${location.host}/ws/dashboard${dashKey ? '?key=' + encodeURIComponent(dashKey) : ''}`);

    ws.onopen = () => {
      document.getElementById('conn-badge').textContent = '● Live';
      document.getElementById('conn-badge').className   = 'status-badge connected';
    };
    ws.onclose = () => {
      document.getElementById('conn-badge').textContent = '● Reconnecting...';
      document.getElementById('conn-badge').className   = 'status-badge disconnected';
      setTimeout(connect, 3000);
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.event === 'init') {
        allOrders = msg.orders || [];
        renderOrders(); updateStats();
      } else if (msg.event === 'new_order') {
        allOrders.unshift(msg.order);
        renderOrders(); updateStats();
        showToast(msg.order);
        playChime();
      } else if (msg.event === 'status_update') {
        const o = allOrders.find(x => x.order_id === msg.order_id);
        if (o) {
          o.status = msg.status;
          renderOrders();
          showStatusToast(msg.order_id, msg.status);
        }
      } else if (msg.event === 'payment_update') {
        const o = allOrders.find(x => x.order_id === msg.order_id);
        if (o) {
          o.payment_status = msg.payment_status;
          o.payment_method = msg.payment_method;
          renderOrders();
          showPaymentToast(msg.order_id, msg.payment_status);
        }
      }
    };
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderOrders() {
    const grid = document.getElementById('orders-grid');
    const list = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);

    if (list.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">📞</div><h3>No orders here</h3><p>Orders appear in real time as Maya takes them.</p></div>`;
      return;
    }
    grid.innerHTML = list.map(buildCard).join('');
  }

  function buildCard(o) {
    const status   = o.status || 'confirmed';
    const type     = o.order_type || 'standard';
    // Support both nested {customer:{name,phone,pickup_time}} and flat fields
    const cust     = o.customer || {};
    const customer = cust.name     || o.customer_name  || '—';
    const phone    = cust.phone    || o.customer_phone || '—';
    const pickup   = cust.pickup_time || o.pickup_time || 'ASAP';
    const subtotal = parseFloat(o.subtotal || 0).toFixed(2);
    const prep     = o.estimated_prep_minutes || 10;
    const ts       = o.timestamp ? new Date(o.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
    const badgeKey = type === 'catering' ? 'catering' : status;
    const labels   = { confirmed:'Confirmed', in_prep:'In Prep', ready:'Ready ✓',
                       picked_up:'Picked Up', catering:'Catering', escalated:'Escalated',
                       pending_callback:'Callback', cancelled:'Cancelled' };

    // Support both o.items (array) and o.items_json (serialized string from SQLite)
    let items = [];
    try { items = Array.isArray(o.items) ? o.items : JSON.parse(o.items_json || '[]'); } catch(e) {}

    const itemsHtml = items.length ? `
      <div class="items-list">
        ${items.map(i => `
          <div class="item-row">
            <span>
              <span class="item-name">${i.quantity||1}× ${i.name||''}</span>
              ${i.modifiers?.length ? `<span class="item-mods">(${i.modifiers.join(', ')})</span>` : ''}
            </span>
            <span class="item-price">$${parseFloat(i.line_total||0).toFixed(2)}</span>
          </div>`).join('')}
      </div>` : (type === 'catering' ? '<p style="color:var(--muted);font-size:.82rem">Full order via callback</p>' : '');

    const cateringExtra = type === 'catering' ? `
      <div style="margin-top:8px;padding:8px;background:rgba(240,165,0,.06);border-radius:6px;font-size:.82rem">
        <div style="color:var(--yellow);font-weight:600;margin-bottom:4px">🎉 Catering Lead</div>
        ${o.headcount ? `<div>Party of <strong>${o.headcount}</strong></div>` : ''}
      </div>` : '';

    // Next-status button
    const nextBtn = {
      confirmed: `<button class="status-btn in_prep"  onclick="updateStatus('${o.order_id}','in_prep')">→ In Prep</button>`,
      in_prep:   `<button class="status-btn ready"    onclick="updateStatus('${o.order_id}','ready')">→ Ready</button>`,
      ready:     `<button class="status-btn picked_up" onclick="updateStatus('${o.order_id}','picked_up')">→ Picked Up</button>`,
    }[status] || '';

    // ── Payment section ──────────────────────────────────────────────────────
    const pStatus = o.payment_status || 'unpaid';
    const paidLabels = {
      paid_card:  '💳 Paid — Card',
      paid_cash:  '💵 Paid — Cash',
      paid_link:  '✅ Paid — Online',
      processing: '⏳ Charging...',
      link_sent:  '📱 Link Sent',
    };
    const paidClasses = {
      paid_card:'paid-card', paid_cash:'paid-cash', paid_link:'paid-link',
      processing:'processing', link_sent:'link-sent',
    };

    let paymentHtml = '';
    if (type !== 'catering') {
      if (pStatus === 'unpaid') {
        paymentHtml = `
          <div class="payment-section">
            <div class="payment-btns">
              <button class="pay-btn terminal" onclick="payTerminal('${o.order_id}','${subtotal}',this)">💳 Charge $${subtotal}</button>
              <button class="pay-btn link"     onclick="sendPayLink('${o.order_id}',this)">📱 Pay Link</button>
              <button class="pay-btn cash"     onclick="markCash('${o.order_id}',this)">💵 Cash</button>
            </div>
          </div>`;
      } else if (paidLabels[pStatus]) {
        const cls = paidClasses[pStatus] || '';
        const resendBtn = pStatus === 'link_sent'
          ? `<button class="pay-btn link" style="flex:0;padding:5px 10px;font-size:.72rem" onclick="sendPayLink('${o.order_id}',this)">Resend</button>`
          : '';
        paymentHtml = `
          <div class="payment-section">
            <div class="payment-btns">
              <span class="payment-badge ${cls}">${paidLabels[pStatus]}</span>
              ${resendBtn}
            </div>
          </div>`;
      }
    }

    return `
      <div class="order-card" data-id="${o.order_id}" data-status="${status}" data-type="${type}" data-payment="${pStatus}">
        <div class="card-header">
          <div>
            <div class="card-customer">${customer}</div>
            <div class="card-time" style="display:flex;align-items:center;gap:6px">
              ${ts}
              ${o.source === 'chatbot'
                ? '<span class="source-tag source-chatbot">Chat</span>'
                : '<span class="source-tag source-voice">Voice</span>'}
            </div>
          </div>
          <span class="badge badge-${badgeKey}">${labels[badgeKey]||status}</span>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <span class="meta-label">Phone</span>  <span class="meta-value">${phone}</span>
            <span class="meta-label">Pickup</span> <span class="meta-value">${pickup}</span>
          </div>
          ${itemsHtml}
          ${cateringExtra}
          ${o.special_instructions ? `<div style="margin-top:8px;font-size:.8rem;color:var(--muted)">📝 ${o.special_instructions}</div>` : ''}
        </div>
        ${paymentHtml}
        <div class="card-footer">
          <span class="subtotal">$${subtotal}</span>
          <div class="status-actions">
            ${nextBtn}
            <button class="status-btn print-btn" onclick="printOrder('${o.order_id}')">🖨</button>
          </div>
          <span class="prep-time">⏱ ${prep} min</span>
        </div>
      </div>`;
  }

  // ── Status Update ──────────────────────────────────────────────────────────
  async function updateStatus(orderId, newStatus) {
    try {
      const res = await fetch(`/api/orders/${orderId}/status`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({status: newStatus}),
      });
      if (!res.ok) throw new Error(await res.text());
      const o = allOrders.find(x => x.order_id === orderId);
      if (o) { o.status = newStatus; renderOrders(); }
      showStatusToast(orderId, newStatus);
    } catch(e) {
      alert('Failed to update status: ' + e.message);
    }
  }

  // ── Payment Actions ────────────────────────────────────────────────────────
  async function payTerminal(orderId, subtotal, btn) {
    btn.disabled = true;
    btn.textContent = '⏳ Charging...';
    try {
      const res = await fetch('/api/payment/terminal/charge', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({order_id: orderId}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Terminal error');
      const o = allOrders.find(x => x.order_id === orderId);
      if (o) { o.payment_status = 'processing'; renderOrders(); }
      addToast('💳 Reader charging...', `Present card on reader — $${subtotal}`, 'status-change');
    } catch(e) {
      btn.disabled = false;
      btn.textContent = `💳 Charge $${subtotal}`;
      addToast('Terminal error', e.message, 'catering');
    }
  }

  async function sendPayLink(orderId, btn) {
    const orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳ Sending...';
    try {
      const res = await fetch('/api/payment/link/send', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({order_id: orderId}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Link error');
      const o = allOrders.find(x => x.order_id === orderId);
      if (o) { o.payment_status = 'link_sent'; renderOrders(); }
      const smsMsg = data.sms_sent ? `SMS sent to ${data.phone}` : 'SMS not sent — no Twilio number configured';
      addToast('📱 Payment link created', smsMsg, 'status-change');
    } catch(e) {
      btn.disabled = false;
      btn.textContent = orig;
      addToast('Pay link error', e.message, 'catering');
    }
  }

  async function markCash(orderId, btn) {
    btn.disabled = true;
    btn.textContent = '⏳...';
    try {
      const res = await fetch('/api/payment/cash', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({order_id: orderId}),
      });
      if (!res.ok) throw new Error(await res.text());
      const o = allOrders.find(x => x.order_id === orderId);
      if (o) { o.payment_status = 'paid_cash'; renderOrders(); }
      addToast('💵 Cash received', `Order #${orderId.slice(0,8).toUpperCase()}`, 'status-change');
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '💵 Cash';
      addToast('Error', e.message, 'catering');
    }
  }

  function showPaymentToast(orderId, paymentStatus) {
    const labels = {
      paid_card:'💳 Card payment confirmed', paid_cash:'💵 Cash confirmed',
      paid_link:'✅ Online payment received', processing:'⏳ Card reader charging...',
      link_sent:'📱 Payment link sent',
    };
    addToast(labels[paymentStatus] || paymentStatus, `Order #${orderId.slice(0,8).toUpperCase()}`, 'status-change');
  }

  // ── Print ──────────────────────────────────────────────────────────────────
  function printOrder(orderId) {
    const o = allOrders.find(x => x.order_id === orderId);
    if (!o) return;
    let items = [];
    try { items = JSON.parse(o.items_json || '[]'); } catch(e) {}

    const win = window.open('', '_blank', 'width=400,height=600');
    win.document.write(`<!DOCTYPE html><html><head><title>Order</title>
      <style>body{font-family:monospace;padding:20px;font-size:13px}h2{margin-bottom:8px}hr{margin:8px 0}
      .row{display:flex;justify-content:space-between}</style></head><body>
      <h2>Maya 2.0 — Order Receipt</h2>
      <p>Order: ${o.order_id.slice(0,8).toUpperCase()}</p>
      <p>Time: ${new Date(o.timestamp).toLocaleString()}</p>
      <hr>
      <p><strong>${o.customer_name || '—'}</strong></p>
      <p>Phone: ${o.customer_phone || '—'}</p>
      <p>Pickup: ${o.pickup_time || 'ASAP'}</p>
      <hr>
      ${items.map(i => `<div class="row"><span>${i.quantity||1}x ${i.name}${i.modifiers?.length?' ('+i.modifiers.join(', ')+')':''}</span><span>$${parseFloat(i.line_total||0).toFixed(2)}</span></div>`).join('')}
      <hr>
      <div class="row"><strong>SUBTOTAL</strong><strong>$${parseFloat(o.subtotal||0).toFixed(2)}</strong></div>
      ${o.special_instructions ? `<p>Notes: ${o.special_instructions}</p>` : ''}
      <script>window.print();window.close();<\/script>
      </body></html>`);
    win.document.close();
  }

  // ── Stats ──────────────────────────────────────────────────────────────────
  function updateStats() {
    const today   = new Date().toDateString();
    const todayOs = allOrders.filter(o => o.timestamp && new Date(o.timestamp).toDateString() === today);
    const revenue = todayOs.filter(o => o.status !== 'escalated').reduce((s, o) => s + parseFloat(o.subtotal||0), 0);
    const catering = todayOs.filter(o => o.order_type === 'catering').length;
    document.getElementById('stat-today').textContent   = todayOs.length;
    document.getElementById('stat-revenue').textContent = `$${revenue.toFixed(2)}`;
    document.getElementById('stat-catering').textContent = catering;
  }

  // ── Toasts ─────────────────────────────────────────────────────────────────
  function showToast(order) {
    const isCatering = order.order_type === 'catering';
    addToast(
      `${isCatering ? '🎉 Catering Lead' : '🍽️ New Order'} — ${order.customer_name || 'Unknown'}`,
      `$${parseFloat(order.subtotal||0).toFixed(2)} | Pickup: ${order.pickup_time || 'ASAP'}`,
      isCatering ? 'catering' : ''
    );
  }

  function showStatusToast(orderId, status) {
    const labels = {in_prep:'In Prep 👨‍🍳', ready:'Ready for pickup ✓', picked_up:'Picked up 👋'};
    addToast(labels[status] || status, `Order #${orderId.slice(0,8).toUpperCase()}`, 'status-change');
  }

  function addToast(title, sub, cls = '') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${cls}`;
    t.innerHTML = `<strong>${title}</strong><br><span style="color:#888">${sub}</span>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 5000);
  }

  // ── Sound ──────────────────────────────────────────────────────────────────
  function playChime() {
    if (!soundEnabled) return;
    try {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    } catch(e) {}
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('sound-toggle');
    btn.textContent = soundEnabled ? '🔔 Sound On' : '🔕 Sound Off';
    btn.classList.toggle('on', soundEnabled);
  }

  // ── Filter Buttons ─────────────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderOrders();
    });
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
