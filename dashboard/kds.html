<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maya — Kitchen Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0f0f1a;
    --surface:  #1a1a2e;
    --surface2: #16213e;
    --accent:   #e94560;
    --green:    #00d084;
    --yellow:   #f0a500;
    --blue:     #4facfe;
    --purple:   #a78bfa;
    --orange:   #fb923c;
    --red:      #e94560;
    --text:     #e8e8f0;
    --muted:    #888aa0;
    --border:   #2a2a45;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header / Top Nav ── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 200; gap: 20px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 1.4rem; font-weight: 800; letter-spacing: -.5px; flex-shrink: 0; }
  .logo-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
  .top-nav { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 10px; }
  .nav-btn { padding: 10px 24px; border-radius: 7px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 1rem; font-weight: 700; transition: all .15s; }
  .nav-btn.active { background: var(--accent); color: #fff; }
  .header-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
  .status-badge { font-size:.85rem; padding:5px 14px; border-radius:20px; font-weight:700; letter-spacing:.5px; white-space: nowrap; }
  .status-badge.connected    { background:rgba(0,208,132,.15); color:var(--green); border:1px solid rgba(0,208,132,.3); }
  .status-badge.disconnected { background:rgba(233,69,96,.15);  color:var(--red);   border:1px solid rgba(233,69,96,.3); }
  .count-badge { font-size:1rem; color:var(--muted); font-weight:700; }
  .count-badge strong { color: var(--text); }

  .view { display: none; }
  .view.active { display: block; }
  main { max-width:1700px; margin:0 auto; padding:20px 24px 48px; }

  .kds-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(430px,1fr)); gap:20px; }

  /* ── Cards ── */
  .kds-card { background:var(--surface); border:2px solid var(--border); border-radius:14px; overflow:hidden; animation:slideIn .25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .kds-card.urgency-amber { border-color: var(--yellow); box-shadow: 0 0 0 2px rgba(240,165,0,.25); }
  .kds-card.urgency-red   { border-color: var(--red);    box-shadow: 0 0 0 3px rgba(233,69,96,.35); }

  .kds-head { padding:16px 20px 12px; border-bottom:2px solid var(--border); }
  .kds-head-top { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .badge-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  /* Ticket number: the loudest thing in the top row — a cook shouts this. */
  .ticket-chip { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size:21px; font-weight:800; line-height:1; color:var(--text);
    background:var(--surface2); border:1px solid var(--border); border-radius:9px; padding:6px 11px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 1px 3px rgba(0,0,0,.45); }
  .badge { font-size:.8rem; font-weight:800; letter-spacing:.5px; padding:5px 12px; border-radius:20px; text-transform:uppercase; white-space:nowrap; }
  .badge-paid     { background:rgba(0,208,132,.18); color:var(--green);  border:1px solid rgba(0,208,132,.4); }
  .badge-unpaid   { background:rgba(240,165,0,.18); color:var(--yellow); border:1px solid rgba(240,165,0,.4); }
  .source-website { background:rgba(79,172,254,.18);  color:var(--blue);   border:1px solid rgba(79,172,254,.4); }
  .source-chatbot { background:rgba(167,139,250,.18); color:var(--purple); border:1px solid rgba(167,139,250,.4); }
  .source-voice   { background:rgba(233,69,96,.15);   color:var(--accent); border:1px solid rgba(233,69,96,.35); }
  .source-phone   { background:rgba(251,146,60,.18);  color:var(--orange); border:1px solid rgba(251,146,60,.4); }
  .source-in_person { background:rgba(0,208,132,.18); color:var(--green);  border:1px solid rgba(0,208,132,.4); }

  /* Live countdown chip. Width is reserved (min-width + tabular digits) so a
     ticking number never nudges the layout. */
  .due-badge { font-size:1.05rem; font-weight:800; padding:6px 14px; border-radius:20px; white-space:nowrap;
    display:inline-flex; align-items:baseline; gap:7px; min-width:132px; justify-content:center;
    border:2px solid transparent; font-variant-numeric:tabular-nums; }
  .due-badge .chip-label { font-size:.72rem; letter-spacing:1px; opacity:.85; }
  .chip-green   { background:rgba(0,208,132,.15);  color:var(--green);  border-color:rgba(0,208,132,.35); }
  .chip-amber   { background:rgba(240,165,0,.18);  color:var(--yellow); border-color:rgba(240,165,0,.4); }
  .chip-red     { background:rgba(233,69,96,.22);  color:#ff8a9a;       border-color:rgba(233,69,96,.55);
                  animation: chipPulse 2s ease-in-out infinite; }
  .chip-unknown { background:rgba(136,138,160,.15); color:var(--muted); border-color:rgba(136,138,160,.3); }
  .chip-done    { background:rgba(136,138,160,.15); color:var(--text); }
  /* Pulse the border only — the number itself must stay rock steady to read. */
  @keyframes chipPulse {
    0%,100% { border-color:rgba(233,69,96,.55); }
    50%     { border-color:rgba(233,69,96,1); }
  }

  /* Reorder animation (item 4). Cards translate to their new slot over ~200ms. */
  .kds-card { will-change: transform; }

  @media (prefers-reduced-motion: reduce) {
    .chip-red { animation: none; }
    .kds-card { transition: none !important; }
    .order-card, .kds-card { animation: none; }
  }

  .kds-customer { font-size:1.35rem; font-weight:800; }
  .kds-meta { display:flex; gap:18px; font-size:1rem; color:var(--muted); margin-top:4px; flex-wrap:wrap; }
  .kds-meta strong { color: var(--text); }

  .kds-body { padding:16px 20px; }
  .kds-item { padding:10px 0; border-bottom:1px solid var(--border); }
  .kds-item:last-child { border-bottom:none; }
  .kds-item-name { font-size:1.15rem; font-weight:800; }
  .kds-item-mods { font-size:1rem; color:var(--yellow); font-weight:600; margin-top:3px; }
  .kds-notes { margin-top:10px; padding:10px 12px; background:rgba(240,165,0,.1); border:1px solid rgba(240,165,0,.3); border-radius:8px; font-size:1rem; color:var(--yellow); font-weight:600; }
  .kds-empty-items { color:var(--muted); font-size:1rem; font-style:italic; }

  .kds-foot { padding:16px 20px 20px; }
  .complete-btn { width:100%; padding:16px; border-radius:10px; border:none; background:var(--green); color:#06281c; font-weight:800; font-size:1.15rem; cursor:pointer; letter-spacing:.3px; }
  .complete-btn:hover { opacity:.9; }
  .undo-btn { width:100%; margin-top:8px; padding:9px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-weight:600; font-size:.85rem; cursor:pointer; }
  .undo-btn:hover { color:var(--text); border-color:var(--text); }

  .empty-state { text-align:center; padding:80px 20px; color:var(--muted); grid-column:1/-1; }
  .empty-state .icon { font-size:3.2rem; margin-bottom:14px; }
  .empty-state h3 { font-size:1.4rem; color:var(--text); }

  @media(max-width:700px) { main{padding:12px} .kds-grid{grid-template-columns:1fr} header{flex-wrap:wrap;height:auto;padding:10px} }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>Maya — Kitchen</div>
  <nav class="top-nav">
    <button class="nav-btn active" data-view="progress" onclick="switchView('progress')">In Progress</button>
    <button class="nav-btn" data-view="completed" onclick="switchView('completed')">Completed</button>
  </nav>
  <div class="header-right">
    <span class="count-badge" id="progress-count">0 in progress</span>
    <span class="status-badge disconnected" id="conn-badge">● Connecting...</span>
  </div>
</header>

<section id="view-progress" class="view active">
  <main>
    <div id="progress-grid" class="kds-grid"></div>
  </main>
</section>

<section id="view-completed" class="view">
  <main>
    <div id="completed-grid" class="kds-grid"></div>
  </main>
</section>

<script src="/dashboard/due-time.js"></script>
<script>
  // ══════════════ State ══════════════
  let allOrders = [];
  let ws = null;
  const DASH_KEY = new URLSearchParams(window.location.search).get('key') || '';

  // Card registry: order_id -> live DOM element (cards persist across renders)
  const cardEls = new Map();
  let lastReorderAt = 0;
  let lastTouchAt = 0;
  const REORDER_INTERVAL_MS = 10000; // batch clock-driven reorders
  const TOUCH_GRACE_MS = 3000;       // never move a card someone just touched
  const REDUCED_MOTION = window.matchMedia
    && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ══════════════ Nav ══════════════
  function switchView(view) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    document.getElementById('view-progress').classList.toggle('active', view === 'progress');
    document.getElementById('view-completed').classList.toggle('active', view === 'completed');
  }

  // ══════════════ WebSocket — same /ws/dashboard feed the employee dashboard uses ══════════════
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/dashboard${DASH_KEY ? '?key=' + encodeURIComponent(DASH_KEY) : ''}`);
    ws.onopen = () => {
      document.getElementById('conn-badge').textContent = '● Live';
      document.getElementById('conn-badge').className = 'status-badge connected';
    };
    ws.onclose = () => {
      document.getElementById('conn-badge').textContent = '● Reconnecting...';
      document.getElementById('conn-badge').className = 'status-badge disconnected';
      setTimeout(connect, 3000);
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.event === 'init') {
        allOrders = msg.orders || [];
        renderAll();
      } else if (msg.event === 'new_order') {
        allOrders.unshift(msg.order);
        renderAll();
      } else if (msg.event === 'status_update') {
        const o = allOrders.find(x => x.order_id === msg.order_id);
        if (o) { o.status = msg.status; o.updated_at = new Date().toISOString(); renderAll(); }
      } else if (msg.event === 'payment_update') {
        const o = allOrders.find(x => x.order_id === msg.order_id);
        if (o) { o.payment_status = msg.payment_status; o.payment_method = msg.payment_method; renderAll(); }
      }
    };
  }

  function renderAll() { renderProgress(); renderCompleted(); }

  // ══════════════ Helpers ══════════════
  function parseItems(o) {
    try { return Array.isArray(o.items) ? o.items : JSON.parse(o.items_json || '[]'); } catch(e) { return []; }
  }
  function ticketLabel(o) { const n = Number(o.ticket_number || 0); return n > 0 ? '#' + String(n).padStart(3, '0') : ''; }
  function sourceLabel(s) { return {website:'Website', chatbot:'Chatbot', voice:'Voice', phone:'Phone', in_person:'In-Person'}[s] || (s||'Unknown'); }
  function custName(o) { return (o.customer && o.customer.name) || o.customer_name || '—'; }
  function custPickup(o) { return (o.customer && o.customer.pickup_time) || o.pickup_time || 'ASAP'; }

  // Adapt a raw order (WS/DB shape) to the pure due-time module's input shape.
  // kitchen_received_at falls back to timestamp for orders created before that
  // column existed, and for the live 'new_order' broadcast which sends the
  // in-memory dict (received == created for every current ingest path).
  function toDueOrder(o) {
    return {
      orderId:          o.order_id,
      prepMinutes:      o.estimated_prep_minutes || 10,
      pickupTime:       custPickup(o),
      orderTimestamp:   o.timestamp,
      kitchenReceivedAt: o.kitchen_received_at || o.timestamp,
    };
  }

  function buildCard(o, opts) {
    const items = parseItems(o);
    const pickup = custPickup(o);
    const now = Date.now();
    const chip = opts.showDue ? DueTime.getChipState(toDueOrder(o), now) : null;
    const age = DueTime.ageMinutes(toDueOrder(o), now);

    const itemsHtml = items.length ? items.map(i => `
      <div class="kds-item">
        <div class="kds-item-name">${i.quantity||1}× ${i.name||''}</div>
        ${i.modifiers && i.modifiers.length ? `<div class="kds-item-mods">${i.modifiers.join(' · ')}</div>` : ''}
      </div>`).join('') : `<div class="kds-empty-items">No items — full order via callback</div>`;

    // Chip is updated in place by the shared ticker — never re-rendered per second.
    const chipHtml = opts.showDue
      ? `<span class="due-badge chip-${chip.level}" data-chip>
           <span data-chip-text>${chip.text}</span><span class="chip-label" data-chip-label>${chip.label}</span>
         </span>`
      : `<span class="due-badge chip-done">✅ ${o.updated_at ? new Date(o.updated_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}</span>`;

    const actionHtml = opts.showDue
      ? `<button class="complete-btn" onclick="markCompleted('${o.order_id}')">✅ Completed</button>`
      : `<button class="undo-btn" onclick="undoCompleted('${o.order_id}')">↩ Move back to In Progress</button>`;

    return `
      <div class="kds-card ${chip ? 'urgency-' + chip.level : ''}" data-id="${o.order_id}">
        <div class="kds-head">
          <div class="kds-head-top">
            <div class="badge-row">
              ${ticketLabel(o) ? `<span class="ticket-chip">${ticketLabel(o)}</span>` : ''}
              <span class="badge source-${o.source||'voice'}">${sourceLabel(o.source)}</span>
            </div>
            ${chipHtml}
          </div>
          <div class="kds-customer">${custName(o)}</div>
          <div class="kds-meta">
            <span>Pickup: <strong>${pickup}</strong></span>
            <span>In kitchen: <strong data-age>${age == null ? '—' : age + ' min'}</strong></span>
          </div>
        </div>
        <div class="kds-body">
          ${itemsHtml}
          ${o.special_instructions ? `<div class="kds-notes">📝 ${o.special_instructions}</div>` : ''}
        </div>
        <div class="kds-foot">${actionHtml}</div>
      </div>`;
  }

  // ══════════════ In Progress ══════════════
  // Cards are created once and then reconciled — never re-rendered wholesale —
  // so the per-second ticker can update text in place, reorders can animate,
  // and a 12-hour shift on a cheap tablet doesn't thrash the DOM.

  /** Visible In-Progress orders, most-urgent (soonest due) first. */
  function progressList(now) {
    return allOrders
      .filter(o =>
        (o.status || 'confirmed') !== 'picked_up' &&
        (o.status || '') !== 'cancelled' &&
        parseItems(o).length > 0 &&
        // Scheduled orders are held off the kitchen screen until pickup − prep.
        // Staff view still shows them the whole time.
        DueTime.getSurfaceState(toDueOrder(o), now) === 'active'
      )
      .map(o => ({ o, due: DueTime.computeDueAt(toDueOrder(o)) ?? Infinity }))
      .sort((a, b) => a.due - b.due)
      .map(x => x.o);
  }

  function renderProgress() {
    const now = Date.now();
    const list = progressList(now);
    const grid = document.getElementById('progress-grid');
    document.getElementById('progress-count').innerHTML = `<strong>${list.length}</strong> in progress`;

    if (!list.length) {
      cardEls.clear();
      grid.innerHTML = `<div class="empty-state"><div class="icon">🍳</div><h3>All caught up — no orders in progress</h3></div>`;
      return;
    }
    const emptyEl = grid.querySelector('.empty-state');
    if (emptyEl) grid.innerHTML = '';

    const wanted = new Set(list.map(o => o.order_id));
    // Drop cards for orders that left the queue
    for (const [id, el] of [...cardEls]) {
      if (!wanted.has(id)) { el.remove(); cardEls.delete(id); }
    }
    // Create new cards / refresh content of existing ones
    let added = false;
    for (const o of list) {
      const existing = cardEls.get(o.order_id);
      const html = buildCard(o, { showDue: true });
      if (!existing) {
        const tpl = document.createElement('template');
        tpl.innerHTML = html.trim();
        const el = tpl.content.firstElementChild;
        grid.appendChild(el);
        cardEls.set(o.order_id, el);
        added = true;
      } else {
        // Content (items, ticket, source) changes only on server events, which is
        // when this runs — cheap. The per-second chip update is handled by tick().
        const tpl = document.createElement('template');
        tpl.innerHTML = html.trim();
        existing.innerHTML = tpl.content.firstElementChild.innerHTML;
      }
    }
    // A newly-arrived ticket should land in its correct slot immediately rather
    // than sit at the bottom for up to 10s.
    applyOrder(list.map(o => o.order_id), added);
    tick();
  }

  // ── Debounced reordering (item 4) ────────────────────────────────────────
  // A card must never move while a cook is reaching for it: reorders are
  // batched to at most once per REORDER_INTERVAL_MS, and are skipped entirely
  // within TOUCH_GRACE_MS of anyone touching the grid.
  function applyOrder(desiredIds, force) {
    const grid = document.getElementById('progress-grid');
    const now = Date.now();
    if (now - lastTouchAt < TOUCH_GRACE_MS) return;
    if (!force && now - lastReorderAt < REORDER_INTERVAL_MS) return;

    const current = [...grid.children].map(el => el.dataset.id);
    if (current.length === desiredIds.length && current.every((id, i) => id === desiredIds[i])) {
      lastReorderAt = now;
      return;
    }

    // FLIP: measure, reorder, then animate from the old position to the new one.
    const first = new Map();
    for (const el of grid.children) first.set(el.dataset.id, el.getBoundingClientRect());

    for (const id of desiredIds) {
      const el = cardEls.get(id);
      if (el) grid.appendChild(el);
    }

    if (!REDUCED_MOTION) {
      for (const el of grid.children) {
        const before = first.get(el.dataset.id);
        if (!before) continue;
        const after = el.getBoundingClientRect();
        const dx = before.left - after.left, dy = before.top - after.top;
        if (!dx && !dy) continue;
        el.style.transition = 'none';
        el.style.transform = `translate(${dx}px, ${dy}px)`;
        requestAnimationFrame(() => {
          el.style.transition = 'transform 200ms ease';
          el.style.transform = '';
        });
      }
    }
    lastReorderAt = now;
  }

  // ── Single shared ticker (item 5) ────────────────────────────────────────
  // One interval drives every card's countdown. Not one timer per card — this
  // runs for 12 hours straight on cheap hardware.
  function tick() {
    const now = Date.now();
    const byId = new Map(allOrders.map(o => [o.order_id, o]));
    for (const [id, el] of cardEls) {
      const o = byId.get(id);
      if (!o) continue;
      const d = toDueOrder(o);
      const chip = DueTime.getChipState(d, now);
      const chipEl = el.querySelector('[data-chip]');
      if (chipEl) {
        const textEl = chipEl.querySelector('[data-chip-text]');
        const labelEl = chipEl.querySelector('[data-chip-label]');
        if (textEl && textEl.textContent !== chip.text) textEl.textContent = chip.text;
        if (labelEl && labelEl.textContent !== chip.label) labelEl.textContent = chip.label;
        const chipClass = `due-badge chip-${chip.level}`;
        if (chipEl.className !== chipClass) chipEl.className = chipClass;
      }
      const cardClass = `kds-card urgency-${chip.level}`;
      if (el.className !== cardClass) el.className = cardClass;

      const ageEl = el.querySelector('[data-age]');
      if (ageEl) {
        const age = DueTime.ageMinutes(d, now);
        const ageText = age == null ? '—' : age + ' min';
        if (ageEl.textContent !== ageText) ageEl.textContent = ageText;
      }
    }
    // Re-sort as the clock moves (applyOrder self-gates to the debounce window).
    applyOrder(progressList(now).map(o => o.order_id), false);
  }

  // ══════════════ Completed — most recently completed first ══════════════
  function renderCompleted() {
    const list = allOrders.filter(o => (o.status || '') === 'picked_up');
    list.sort((a, b) => new Date(b.updated_at || b.timestamp) - new Date(a.updated_at || a.timestamp));
    const grid = document.getElementById('completed-grid');
    grid.innerHTML = list.length
      ? list.map(o => buildCard(o, { showDue: false })).join('')
      : `<div class="empty-state"><div class="icon">✅</div><h3>Nothing completed yet</h3></div>`;
  }

  // ══════════════ Mark complete / undo — same status field & endpoint /kitchen already used ══════════════
  async function markCompleted(orderId) {
    await setStatus(orderId, 'picked_up');
  }
  async function undoCompleted(orderId) {
    await setStatus(orderId, 'confirmed');
  }
  async function setStatus(orderId, status) {
    try {
      const res = await fetch(`/api/orders/${orderId}/status${DASH_KEY ? '?key='+encodeURIComponent(DASH_KEY):''}`, {
        method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status}),
      });
      if (!res.ok) throw new Error(await res.text());
      const o = allOrders.find(x => x.order_id === orderId);
      if (o) { o.status = status; o.updated_at = new Date().toISOString(); renderAll(); }
    } catch(e) { alert('Failed to update order: ' + e.message); }
  }

  // ══════════════ Init ══════════════
  // Any hand on the grid pauses reordering for TOUCH_GRACE_MS.
  ['pointerdown', 'touchstart'].forEach(evt =>
    document.getElementById('progress-grid')
      .addEventListener(evt, () => { lastTouchAt = Date.now(); }, { passive: true })
  );

  connect();
  setInterval(tick, 1000); // ONE shared ticker for every card's countdown
</script>
</body>
</html>
